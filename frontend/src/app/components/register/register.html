<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>EventHub</mat-card-title>
      <mat-card-subtitle>Inregistrare cont nou</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nume complet</mat-label>
          <input matInput formControlName="fullName" placeholder="Ion Popescu">
          <mat-error *ngIf="registerForm.get('fullName')?.hasError('required')">
            Numele este obligatoriu
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="email@exemplu.com">
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
            Emailul este obligatoriu
          </mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
            Email invalid
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Parola</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
            Parola este obligatorie
          </mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
            Parola trebuie sa aiba minim 6 caractere
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirma parola</mat-label>
          <input matInput type="password" formControlName="confirmPassword">
        </mat-form-field>

        <div *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched" 
            class="error-message">
          Parolele nu coincid
        </div>

        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>

        <button mat-raised-button color="primary" type="submit"
          [disabled]="registerForm.get('fullName')?.invalid || 
                      registerForm.get('email')?.invalid || 
                      registerForm.get('password')?.invalid || 
                      loading" class="full-width">
          {{ loading ? 'Se incarca...' : 'Creeaza cont' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>Ai deja cont? <a routerLink="/login">Autentifica-te</a></p>
    </mat-card-actions>
  </mat-card>
</div>
